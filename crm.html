<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Record</title>
  <style>
    :root {
      --zoom-blue: #0b5cff;
      --blue-2: #2563eb;
      --ink: #0f172a;
      --text: #1f2937;
      --muted: #64748b;
      --line: #e2e8f0;
      --soft: #f8fbff;
      --panel: rgba(255, 255, 255, 0.92);
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 22px;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 0%, rgba(11, 92, 255, 0.18), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(37, 99, 235, 0.16), transparent 26%),
        linear-gradient(135deg, #f7faff 0%, #eef5ff 48%, #fbfdff 100%);
    }

    .app {
      width: min(1500px, calc(100% - 52px));
      margin: 32px auto;
    }

    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 64px);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    aside {
      background: #0b1220;
      color: white;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--zoom-blue), #4f8cff);
      box-shadow: 0 16px 38px rgba(11, 92, 255, 0.34);
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      color: rgba(255,255,255,0.72);
      font-weight: 750;
    }

    .nav-item.active {
      color: white;
      background: rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.09);
    }

    .nav-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.8;
    }

    .agent-card {
      margin-top: auto;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .agent-card small {
      display: block;
      color: rgba(255,255,255,0.58);
      font-weight: 700;
      margin-bottom: 7px;
    }

    .agent-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      color: #86efac;
      font-weight: 800;
      font-size: 13px;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34,197,94,0.12);
    }

    main {
      padding: 30px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .search {
      flex: 1;
      max-width: 520px;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 17px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      color: var(--muted);
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }

    .clock {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .profile {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: linear-gradient(120deg, #0b5cff, #2f6df6 58%, #173fb7);
      color: white;
      padding: 34px;
      box-shadow: 0 22px 54px rgba(11, 92, 255, 0.24);
    }

    .profile::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -120px;
      width: 340px;
      height: 340px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
    }

    .profile-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }

    .person {
      display: flex;
      gap: 20px;
      align-items: center;
      min-width: 0;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255,255,255,0.38);
      box-shadow: 0 12px 28px rgba(11, 32, 67, 0.18);
      background: rgba(255,255,255,0.22);
      transition: opacity 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .avatar.empty {
      background: rgba(255,255,255,0.96);
      border-color: rgba(11, 32, 67, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 12px 28px rgba(11, 32, 67, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    .subline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: rgba(255,255,255,0.86);
      font-size: 18px;
      font-weight: 780;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.20);
    }

    .score {
      width: 220px;
      padding: 19px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.22);
      text-align: right;
    }

    .score span {
      display: block;
      color: rgba(255,255,255,0.74);
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score strong {
      display: block;
      margin-top: 4px;
      font-size: 35px;
      letter-spacing: -0.04em;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .card-header {
      min-height: 68px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .card-title {
      margin: 0;
      color: var(--ink);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--zoom-blue);
      background: #eef4ff;
      border: 1px solid #dbe8ff;
      font-size: 13px;
      font-weight: 900;
    }

    .card-body { padding: 22px; }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      position: relative;
      padding: 15px 16px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #fff;
      min-height: 88px;
      transition: border-color .22s, box-shadow .22s, transform .22s;
    }

    .field.highlight {
      animation: fieldPop 1.2s ease both;
    }

    @keyframes fieldPop {
      0% { border-color: rgba(11,92,255,0.95); box-shadow: 0 0 0 6px rgba(11,92,255,0.14); transform: translateY(-2px); }
      100% { border-color: var(--line); box-shadow: none; transform: translateY(0); }
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: -0.03em;
      padding: 0;
    }

    input::placeholder { color: #cbd5e1; }

    .wide { grid-column: 1 / -1; }

    .side-stack {
      display: grid;
      gap: 24px;
    }

    .activity {
      display: grid;
      gap: 14px;
    }

    .activity-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start;
    }

    .activity-icon {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: var(--zoom-blue);
      background: #eef4ff;
      font-weight: 950;
    }

    .activity-copy strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
      margin-bottom: 2px;
    }

    .activity-copy span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 15px;
      padding: 14px 16px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--zoom-blue), var(--blue-2));
      box-shadow: 0 14px 30px rgba(11, 92, 255, 0.22);
      transition: transform .16s, filter .16s;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:active { transform: translateY(0); }

    button.secondary {
      color: var(--ink);
      background: #f8fafc;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .case-list {
      display: grid;
      gap: 10px;
    }

    .case {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
    }

    .case strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .case span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      min-width: 270px;
      padding: 16px 18px;
      border-radius: 16px;
      color: white;
      background: #0f172a;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      font-weight: 850;
      z-index: 20;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    svg { width: 20px; height: 20px; flex: none; }

    @media (max-width: 1100px) {
      .shell { grid-template-columns: 1fr; }
      aside { display: none; }
      .content { grid-template-columns: 1fr; }
      .score { display: none; }
    }

    @media (max-width: 720px) {
      .app { width: min(100% - 24px, 1500px); margin: 12px auto; }
      main { padding: 18px; }
      .topbar { display: none; }
      .profile { padding: 24px; }
      .person { align-items: flex-start; }
      .avatar { width: 72px; height: 72px; border-radius: 20px; font-size: 25px; }
      .field-grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      h1 { font-size: 38px; }
      input { font-size: 19px; }
    }
  </style>
</head>

              <div>
                <h1 id="customerName"></h1>
              </div>
            </div>
            <div class="score">
              <span>Customer health</span>
              <strong id="customerHealth"></strong>
            </div>
          </div>
        </section>

        <section class="content">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Customer Details</h2>
              <span class="badge" id="statusBadge">No active interaction</span>
            </div>
            <div class="card-body">
              <div class="field-grid">
                <div class="field" data-field="firstName">
                  <label for="firstName">First name</label>
                  <input id="firstName" autocomplete="off" />
                </div>
                <div class="field" data-field="lastName">
                  <label for="lastName">Last name</label>
                  <input id="lastName" autocomplete="off" />
                </div>
                <div class="field" data-field="phone">
                  <label for="phone">Phone</label>
                  <input id="phone" autocomplete="off" />
                </div>
                <div class="field" data-field="queue">
                  <label for="queue">Queue</label>
                  <input id="queue" autocomplete="off" />
                </div>
                <div class="field" data-field="engagementId">
                  <label for="engagementId">Engagement ID</label>
                  <input id="engagementId" autocomplete="off" />
                </div>
                <div class="field" data-field="customVariable">
                  <label for="customVariable">Account Number</label>
                  <input id="customVariable" autocomplete="off" />
                </div>
                <div class="field" data-field="channel">
                  <label for="channel">Channel</label>
                  <input id="channel" autocomplete="off" />
                </div>
                <div class="field" data-field="direction">
                  <label for="direction">Direction</label>
                  <input id="direction" autocomplete="off" />
                </div>
                <div class="field" data-field="trigger">
                  <label for="trigger">Status</label>
                  <input id="trigger" autocomplete="off" />
                </div>
              </div>
            </div>
          </div>

          <div class="side-stack">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Actions</h2>
              </div>
              <div class="card-body">
                <div class="actions">
                  <button id="noteBtn" type="button">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M14 3v4a1 1 0 0 0 1 1h4M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2ZM9 13h6M9 17h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Note
                  </button>
                  <button id="taskBtn" class="secondary" type="button">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Task
                  </button>
                </div>
              </div>
            </div>
<div class="card">
              <div class="card-header">
                <h2 class="card-title">Open Cases</h2>
              </div>
              <div class="card-body">
                <div class="case-list" id="openCasesList"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast" id="toast">Done</div>

  <script>
    const fields = {
      firstName: document.getElementById('firstName'),
      lastName: document.getElementById('lastName'),
      phone: document.getElementById('phone'),
      queue: document.getElementById('queue'),
      engagementId: document.getElementById('engagementId'),
      customVariable: document.getElementById('customVariable'),
      channel: document.getElementById('channel'),
      direction: document.getElementById('direction'),
      trigger: document.getElementById('trigger')
    };

    const aliases = {
      firstName: ['firstName', 'first', 'F', '%F'],
      lastName: ['lastName', 'last', 'L', '%L'],
      phone: ['phone', 'mobile', 'E', 'C', '%E', '%C'],
      queue: ['queue', 'Q', '%Q'],
      engagementId: ['engagementId', 'id', 'ID', '%ID'],
      customVariable: ['customVariable', 'accountNumber', 'AccountNumber', 'account', 'custom', 'global_custom.Custom.AccountNumber'],
      channel: ['channel', 'CN', '%CN'],
      direction: ['direction', 'DIR', '%DIR'],
      trigger: ['trigger', 'event', 'EVT', '%EVT']
    };

    const defaults = {
      firstName: '',
      lastName: '',
      phone: '',
      queue: '',
      engagementId: '',
      customVariable: '',
      channel: '',
      direction: '',
      trigger: ''
    };

    function getParam(params, names) {
      for (const name of names) {
        if (params.has(name)) return params.get(name);
      }
      return '';
    }

    function fillFromUrl() {
      const params = new URLSearchParams(window.location.search);
      for (const key of Object.keys(fields)) {
        const incoming = getParam(params, aliases[key]);
        fields[key].value = incoming || defaults[key];
        if (incoming) {
          const wrapper = document.querySelector(`[data-field="${key}"]`);
          if (wrapper) wrapper.classList.add('highlight');
        }
      }

      updateComputedUi();
    }

    function updateComputedUi() {
      const firstName = fields.firstName.value.trim();
      const lastName = fields.lastName.value.trim();
      const fullName = `${firstName} ${lastName}`.trim();
      const direction = fields.direction.value.trim();
      const trigger = fields.trigger.value.trim();
      const avatar = document.getElementById('avatar');
      const hasIdentity = Boolean(fullName);

      document.getElementById('customerName').textContent = hasIdentity ? fullName : '';
      document.getElementById('customerName').style.minHeight = hasIdentity ? '' : '1.1em';
      avatar.alt = hasIdentity ? fullName : 'Customer avatar';
      avatar.src = hasIdentity ? avatar.dataset.activeSrc : avatar.dataset.blankSrc;
      avatar.classList.toggle('empty', !hasIdentity);
      document.getElementById('customerHealth').textContent = hasIdentity ? '96%' : '';
      document.getElementById('openCasesList').innerHTML = hasIdentity ? `
                  <div class="case">
                    <strong>Billing enquiry</strong>
                    <span>Updated today · Medium priority</span>
                  </div>
                  <div class="case">
                    <strong>Service follow-up</strong>
                    <span>Open · Assigned to support queue</span>
                  </div>` : '';
      document.getElementById('statusBadge').textContent = direction || trigger ? `${direction || 'Interaction'}${direction && trigger ? ' · ' : ''}${trigger}` : 'No active interaction';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1700);
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
      });
    }

    document.getElementById('noteBtn').addEventListener('click', () => showToast(`Note saved to ${fields.engagementId.value || 'customer record'}`));
    document.getElementById('taskBtn').addEventListener('click', () => showToast('Task created'));

    Object.values(fields).forEach(el => {
      el.addEventListener('input', updateComputedUi);
      el.addEventListener('change', updateComputedUi);
    });

    fillFromUrl();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
